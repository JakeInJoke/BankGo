name: bank_go
description: BankGo - Aplicación de banca móvil base en Flutter.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado / State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Inyección de dependencias
  get_it: ^7.6.4

  # Networking
  dio: ^5.3.2

  # Almacenamiento local
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Utilidades
  intl: ^0.19.0
  dartz: ^0.10.1
  logger: ^2.0.2+1
  connectivity_plus: ^7.1.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  bloc_test: ^9.1.5
  mockito: ^5.4.2
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

