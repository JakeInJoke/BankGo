on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes (opcional)"
        required: false
        type: string

permissions:
  contents: write
  
concurrency:
  group: release-android-main
  cancel-in-progress: false

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          # Find latest semver tag like v1.2.3
          latest_tag=$(git tag -l 'v*' | sort -V | tail -n 1 || true)

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
          else
            if [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              next_tag="v${major}.${minor}.$((patch + 1))"
            else
              echo "Latest tag '${latest_tag}' is not in vMAJOR.MINOR.PATCH format" >&2
              exit 1
            fi
          fi

          echo "TAG_NAME=${next_tag}" >> "$GITHUB_ENV"

          notes_input='${{ inputs.notes }}'
          if [[ -n "${notes_input}" ]]; then
            echo "RELEASE_NOTES<<EOF" >> "$GITHUB_ENV"
            echo "${notes_input}" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "RELEASE_NOTES=Automated release from merge to main" >> "$GITHUB_ENV"
          fi

          echo "Next tag: ${next_tag}"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Decode keystore (from secrets)
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<'EOF'
          storeFile=app/keystore/upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF

      - name: Build AAB (release)
        run: flutter build appbundle --release

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
