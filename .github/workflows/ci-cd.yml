name: BankGo CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "release/*"]
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes (opcional)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: bankgo-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate (Analyze, Test, Sonar)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare ProGuard dictionary for CI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/app
          if [[ ! -f android/app/obfuscation_dictionary.txt ]]; then
            cat > android/app/obfuscation_dictionary.txt <<'EOF'
            alpha
            bravo
            charlie
            delta
            echo
            foxtrot
            golf
            hotel
            india
            juliet
            kilo
            lima
            mike
            november
            oscar
            papa
            quebec
            romeo
            sierra
            tango
            uniform
            victor
            whiskey
            xray
            yankee
            zulu
            EOF
          fi
          test -f android/app/obfuscation_dictionary.txt

      - name: Analyze project source
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Validate SonarCloud required configuration
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          test -n "${{ secrets.SONAR_TOKEN }}" || (echo "Missing required secret: SONAR_TOKEN" && exit 1)
          test -n "${{ vars.SONAR_PROJECT_KEY }}" || (echo "Missing required variable: SONAR_PROJECT_KEY" && exit 1)
          test -n "${{ vars.SONAR_ORG_KEY }}" || (echo "Missing required variable: SONAR_ORG_KEY" && exit 1)

      - name: SonarCloud Scan
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORG_KEY }}
            -Dsonar.sources=lib
            -Dsonar.tests=test
            -Dsonar.dart.analyzer.report.path=

      - name: SonarCloud Quality Gate (mandatory)
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  release:
    name: Build and Release (Obfuscated)
    if: ${{ github.event_name != 'pull_request' }}
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest_tag=$(git tag -l 'v*' | sort -V | tail -n 1 || true)

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.0.1"
          else
            if [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
              minor="${BASH_REMATCH[2]}"
              patch="${BASH_REMATCH[3]}"
              next_tag="v${major}.${minor}.$((patch + 1))"
            else
              echo "Latest tag '${latest_tag}' is not in vMAJOR.MINOR.PATCH format" >&2
              exit 1
            fi
          fi

          echo "TAG_NAME=${next_tag}" >> "$GITHUB_ENV"

          notes_input='${{ inputs.notes }}'
          if [[ -n "${notes_input}" ]]; then
            echo "RELEASE_NOTES<<EOF" >> "$GITHUB_ENV"
            echo "${notes_input}" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "RELEASE_NOTES=Automated release from merge to main" >> "$GITHUB_ENV"
          fi

          echo "Next tag: ${next_tag}"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare ProGuard dictionary for release build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p android/app
          if [[ ! -f android/app/obfuscation_dictionary.txt ]]; then
            cat > android/app/obfuscation_dictionary.txt <<'EOF'
            alpha
            bravo
            charlie
            delta
            echo
            foxtrot
            golf
            hotel
            india
            juliet
            kilo
            lima
            mike
            november
            oscar
            papa
            quebec
            romeo
            sierra
            tango
            uniform
            victor
            whiskey
            xray
            yankee
            zulu
            EOF
          fi
          test -f android/app/obfuscation_dictionary.txt

      - name: Decode keystore (from secrets)
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<'EOF'
          storeFile=keystore/upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          EOF

      - name: Verify signing files
        run: |
          test -f android/key.properties
          test -f android/app/keystore/upload-keystore.jks

      - name: Create symbols directory
        run: mkdir -p build/symbols

      - name: Build AAB (release, obfuscated)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/symbols

      - name: Build APK (release, obfuscated)
        run: flutter build apk --release --obfuscate --split-debug-info=build/symbols

      - name: Upload debug symbols artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-debug-symbols-${{ env.TAG_NAME }}
          path: build/symbols
          if-no-files-found: error

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}"
          git push origin "${TAG_NAME}"

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
